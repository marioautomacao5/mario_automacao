<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Home Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            background-color: #0077cc;
            color: white;
            padding: 20px;
            text-align: center;
        }
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        main a {
            display: block;
            margin: 10px 0;
            padding: 15px 25px;
            text-decoration: none;
            color: white;
            background-color: #0077cc;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        main a:hover {
            background-color: #005fa3;
        }
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 15px;
        }
        footer a {
            color: #ffcc00;
            margin: 0 10px;
            text-decoration: none;
        }
        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <h1>Bem-vindo à Minha Página</h1>
    </header>

    <main>
        <h2>Escolha uma página para visitar:</h2>
        <a href="pagina1.html">Página 1</a>

        </p>

    </footer>
</body>
</html>
